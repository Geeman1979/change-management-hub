services:
  - type: web
    name: change-management-hub
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        value: ""
      - key: DATABASE_URL
        value: ""
